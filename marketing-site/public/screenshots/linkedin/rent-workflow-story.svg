<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" width="1200" height="627">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020f1a"/>
      <stop offset="55%" stop-color="#0b4f6c"/>
      <stop offset="100%" stop-color="#0e6b8a"/>
    </linearGradient>

    <!-- Teal glow behind headline -->
    <radialGradient id="glowGrad" cx="35%" cy="45%" r="42%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <!-- Subtle glow on accent line -->
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="627" fill="url(#bgGrad)"/>
  <rect width="1200" height="627" fill="url(#glowGrad)"/>

  <!-- Subtle grid texture -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="627" fill="url(#grid)"/>

  <!-- Left decorative vertical accent bar -->
  <rect x="64" y="80" width="4" height="460" rx="2" fill="#14b8a6" opacity="0.7" filter="url(#lineGlow)"/>

  <!-- ── OASIS logo mark (top-left) ── -->
  <rect x="88" y="70" width="54" height="54" rx="10" fill="#0b4f6c" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="115" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#14b8a6" text-anchor="middle" dominant-baseline="middle">O</text>
  <text x="115" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="700" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="3">ASIS</text>

  <!-- Brand name next to logo -->
  <text x="155" y="97" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.5)" letter-spacing="2">OASIS RENTAL</text>

  <!-- ── Main headline ── -->
  <text x="88" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="#ffffff" letter-spacing="-1">Rent isn't just</text>
  <text x="88" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="#ffffff" letter-spacing="-1">a number.</text>
  <text x="88" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="#14b8a6" letter-spacing="-1">It's a workflow. 💸</text>

  <!-- Thin teal underline under last headline word -->
  <rect x="88" y="376" width="560" height="3" rx="1.5" fill="#14b8a6" opacity="0.5" filter="url(#lineGlow)"/>

  <!-- ── Sub-copy ── -->
  <text x="88" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(255,255,255,0.68)" letter-spacing="0.3">
    Invoice → Reminder → Payment → Receipt → Renewal
  </text>

  <!-- ── Workflow pill cards (right side) ── -->
  <!-- Card 1: Invoice -->
  <rect x="680" y="90" width="200" height="78" rx="14" fill="#0b4f6c" stroke="#14b8a6" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="700" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#14b8a6">📄  INVOICE SENT</text>
  <text x="700" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">Automated on the 1st</text>

  <!-- Arrow 1→2 -->
  <line x1="780" y1="168" x2="780" y2="188" stroke="#14b8a6" stroke-width="2" stroke-dasharray="4 3" opacity="0.7"/>
  <polygon points="774,185 780,198 786,185" fill="#14b8a6" opacity="0.7"/>

  <!-- Card 2: Reminder -->
  <rect x="680" y="198" width="200" height="78" rx="14" fill="#0b4f6c" stroke="#14b8a6" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="700" y="233" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#14b8a6">🔔  REMINDER</text>
  <text x="700" y="256" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">SMS + email on day 3</text>

  <!-- Arrow 2→3 -->
  <line x1="780" y1="276" x2="780" y2="296" stroke="#14b8a6" stroke-width="2" stroke-dasharray="4 3" opacity="0.7"/>
  <polygon points="774,293 780,306 786,293" fill="#14b8a6" opacity="0.7"/>

  <!-- Card 3: Payment -->
  <rect x="680" y="306" width="200" height="78" rx="14" fill="#0b4f6c" stroke="#14b8a6" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="700" y="341" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#14b8a6">💳  PAYMENT IN</text>
  <text x="700" y="364" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">Logged &amp; reconciled</text>

  <!-- Arrow 3→4 -->
  <line x1="780" y1="384" x2="780" y2="404" stroke="#14b8a6" stroke-width="2" stroke-dasharray="4 3" opacity="0.7"/>
  <polygon points="774,401 780,414 786,401" fill="#14b8a6" opacity="0.7"/>

  <!-- Card 4: Receipt -->
  <rect x="680" y="414" width="200" height="78" rx="14" fill="#0b4f6c" stroke="#14b8a6" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="700" y="449" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#14b8a6">✅  RECEIPT SENT</text>
  <text x="700" y="472" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">Tenant confirmed</text>

  <!-- ── Second column: extra stat cards ── -->
  <!-- Stat card A -->
  <rect x="900" y="140" width="222" height="100" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="920" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#14b8a6">98%</text>
  <text x="920" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">on-time collection rate</text>

  <!-- Stat card B -->
  <rect x="900" y="266" width="222" height="100" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="920" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#14b8a6">0</text>
  <text x="920" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">manual follow-ups needed</text>
  <text x="920" y="343" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">when OASIS runs your rent</text>

  <!-- Stat card C -->
  <rect x="900" y="392" width="222" height="100" rx="14" fill="rgba(20,184,166,0.12)" stroke="#14b8a6" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="920" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#14b8a6">∞</text>
  <text x="920" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.65)">properties, one dashboard</text>
  <text x="920" y="473" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.65)">automate, audit, act</text>

  <!-- ── Bottom CTA strip ── -->
  <rect x="0" y="567" width="1200" height="60" fill="rgba(0,0,0,0.25)"/>
  <text x="88" y="603" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.45)" letter-spacing="1">oasisrentalmgt.app</text>
  <text x="1112" y="603" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#14b8a6" text-anchor="end" letter-spacing="0.5">Try OASIS free →</text>
</svg>
