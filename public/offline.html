<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tenaqo — Offline</title>
    <style>
      :root {
        --brand: #0b4f6c;
        --accent: #14b8a6;
        --bg: #f0f9ff;
        --ink: #17212b;
        --muted: #53616f;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        text-align: center;
      }

      .logo {
        font-size: 1.1rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--brand);
        margin-bottom: 2.5rem;
      }

      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 1.75rem;
        border-radius: 20px;
        background: var(--brand);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon svg {
        width: 44px;
        height: 44px;
        color: var(--accent);
      }

      h1 {
        font-size: clamp(1.4rem, 5vw, 2rem);
        font-weight: 700;
        color: var(--brand);
        margin-bottom: 0.75rem;
        line-height: 1.2;
      }

      p {
        font-size: 1rem;
        line-height: 1.65;
        color: var(--muted);
        max-width: 380px;
        margin: 0 auto 2rem;
      }

      .btn {
        display: inline-block;
        padding: 0.875rem 1.75rem;
        background: var(--brand);
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        min-height: 48px;
        text-decoration: none;
        transition: background 140ms ease;
      }

      .btn:hover { background: #07384d; }

      .note {
        margin-top: 2rem;
        font-size: 0.82rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <p class="logo">Tenaqo</p>

    <div class="icon" aria-hidden="true">
      <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M1 6s4-6 11-6 11 6 11 6-4 6-11 6S1 6 1 6z"/>
        <circle cx="12" cy="6" r="2"/>
        <path d="M5 12c0 4.418 3.134 8 7 8s7-3.582 7-8"/>
        <line x1="12" y1="14" x2="12" y2="22"/>
      </svg>
    </div>

    <h1>You're offline</h1>
    <p>
      Tenaqo needs a connection to load your portfolio data securely.
      Check your network and try again.
    </p>

    <button class="btn" onclick="window.location.reload()">
      Try again
    </button>

    <p class="note">
      Your data is safe. Tenaqo does not store sensitive information offline.
    </p>
  </body>
</html>
