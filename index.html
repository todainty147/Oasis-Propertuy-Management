<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>Tenaqo | Rental Operations Software</title>
    <meta name="description" content="Rental operations software for landlords and property managers. Manage rent, repairs, documents, tenants, contractors, compliance readiness, and next actions in one operating layer." />
    <meta name="application-name" content="Tenaqo" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme / brand colour -->
    <meta name="theme-color" content="#0b4f6c" />
    <meta name="theme-color" content="#0b4f6c" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#07384d" media="(prefers-color-scheme: dark)" />
    <meta name="msapplication-TileColor" content="#0b4f6c" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tenaqo" />
    <link rel="apple-touch-icon" href="/brand/tenaqo/app-icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/brand/tenaqo/app-icon-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="/brand/tenaqo/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/tenaqo/favicon-32.png" />
    <link rel="shortcut icon" href="/brand/tenaqo/favicon.ico" />

    <!-- Mobile safe-area colour -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Preconnect to Supabase for faster auth/data -->
    <link rel="preconnect" href="https://supabase.co" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
