<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>OASIS Rental Management</title>
    <meta name="description" content="Automated property management for landlords. Track rent, maintenance, tenants, documents, and compliance from one dashboard." />
    <meta name="application-name" content="OASIS Rental" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme / brand colour -->
    <meta name="theme-color" content="#0b4f6c" />
    <meta name="theme-color" content="#0b4f6c" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#07384d" media="(prefers-color-scheme: dark)" />
    <meta name="msapplication-TileColor" content="#0b4f6c" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OASIS" />
    <link rel="apple-touch-icon" href="/icons/app-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/app-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/app-icon.png" />
    <link rel="shortcut icon" href="/icons/app-icon.png" />

    <!-- Mobile safe-area colour -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Preconnect to Supabase for faster auth/data -->
    <link rel="preconnect" href="https://supabase.co" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
